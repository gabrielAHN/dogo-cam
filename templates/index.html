<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>{{ dog_name }} Stream</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #000;

        }

        #video-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        h1 {
            font-family: 'Roboto', sans-serif;
            color: #fff;
            text-align: center;
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        #temp {
            color: #fff;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-family: 'Roboto', sans-serif;
        }

        #stream-status {
            color: #fff;
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 11;
            font-family: 'Roboto', sans-serif;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
        }

        #fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 11;
            background-color: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 24px;
            cursor: pointer;
            font-family: 'Roboto', sans-serif;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        #fullscreen-btn:hover {
            background-color: rgba(0, 0, 0, 0.8);
            border-color: rgba(255, 255, 255, 0.6);
        }

        #fullscreen-btn:active {
            transform: scale(0.95);
        }

        /* Hide fullscreen button when in fullscreen mode */
        body:fullscreen #fullscreen-btn,
        body:-webkit-full-screen #fullscreen-btn,
        body:-moz-full-screen #fullscreen-btn,
        body:-ms-fullscreen #fullscreen-btn {
            opacity: 0.3;
        }

        body:fullscreen #fullscreen-btn:hover,
        body:-webkit-full-screen #fullscreen-btn:hover,
        body:-moz-full-screen #fullscreen-btn:hover,
        body:-ms-fullscreen #fullscreen-btn:hover {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div id="video-container">
        <h1>{{ dog_name }} Stream</h1>
        <div id="stream-status" hx-get="/stream_status" hx-trigger="load, every 2s" hx-swap="innerHTML">
            Checking status...
        </div>
        <button id="fullscreen-btn" title="Toggle Fullscreen">⛶</button>
        <img src="{{ url_for('video_feed') }}" alt="Live Dog Cam">
        <div id="temp" hx-get="/temp" hx-trigger="load, every 10s" hx-swap="innerHTML">
            Loading temperature...
        </div>
    </div>

    <script>
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const container = document.body;

        // Function to check if currently in fullscreen
        function isFullscreen() {
            return !!(document.fullscreenElement ||
                     document.webkitFullscreenElement ||
                     document.mozFullScreenElement ||
                     document.msFullscreenElement);
        }

        // Function to enter fullscreen with mobile support
        function enterFullscreen(element) {
            if (element.requestFullscreen) {
                return element.requestFullscreen();
            } else if (element.webkitRequestFullscreen) {
                // iOS Safari
                return element.webkitRequestFullscreen();
            } else if (element.webkitEnterFullscreen) {
                // Older iOS
                return element.webkitEnterFullscreen();
            } else if (element.mozRequestFullScreen) {
                // Firefox
                return element.mozRequestFullScreen();
            } else if (element.msRequestFullscreen) {
                // IE/Edge
                return element.msRequestFullscreen();
            }
            return Promise.reject(new Error('Fullscreen not supported'));
        }

        // Function to exit fullscreen with mobile support
        function exitFullscreen() {
            if (document.exitFullscreen) {
                return document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
                return document.webkitExitFullscreen();
            } else if (document.mozCancelFullScreen) {
                return document.mozCancelFullScreen();
            } else if (document.msExitFullscreen) {
                return document.msExitFullscreen();
            }
            return Promise.reject(new Error('Exit fullscreen not supported'));
        }

        fullscreenBtn.addEventListener('click', () => {
            if (!isFullscreen()) {
                enterFullscreen(container).catch(err => {
                    console.log(`Error attempting fullscreen: ${err.message}`);
                });
            } else {
                exitFullscreen();
            }
        });

        // Update button icon based on fullscreen state (cross-browser)
        document.addEventListener('fullscreenchange', updateFullscreenButton);
        document.addEventListener('webkitfullscreenchange', updateFullscreenButton);
        document.addEventListener('mozfullscreenchange', updateFullscreenButton);
        document.addEventListener('MSFullscreenChange', updateFullscreenButton);

        function updateFullscreenButton() {
            fullscreenBtn.textContent = isFullscreen() ? '⛶' : '⛶';
        }
    </script>
</body>

</html>
